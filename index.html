<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SRO SUSEP — Assistente de Registro | Chubb</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f7f7;
      --surface: #ffffff;
      --border: #e0e0e0;
      --primary: #5A2D82;       /* Chubb purple */
      --primary-dark: #3d1f5c;
      --primary-light: #f3edf9;
      --text: #1a1a1a;
      --text-muted: #666666;
      --user-bg: #5A2D82;
      --user-text: #ffffff;
      --bot-bg: #ffffff;
      --shadow: 0 1px 4px rgba(0,0,0,0.08);
      --radius: 4px;            /* Chubb uses sharp corners */
    }

    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 3px solid var(--primary);
      padding: 0 32px;
      height: 60px;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    /* Chubb wordmark */
    .chubb-logo {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--primary);
      text-transform: uppercase;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    .header-divider {
      width: 1px;
      height: 24px;
      background: var(--border);
    }

    .header-title {
      font-size: 14px;
      font-weight: 400;
      color: var(--text-muted);
      letter-spacing: 0.3px;
    }

    .header-badge {
      margin-left: auto;
      font-size: 11px;
      font-weight: 600;
      background: var(--primary-light);
      color: var(--primary);
      padding: 3px 10px;
      border-radius: 2px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* ── Chat area ── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 32px 0;
      scroll-behavior: smooth;
    }

    .chat-inner {
      max-width: 760px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    /* ── Welcome ── */
    .welcome {
      text-align: center;
      padding: 32px 16px 40px;
    }

    .welcome-line {
      width: 48px;
      height: 3px;
      background: var(--primary);
      margin: 0 auto 20px;
    }

    .welcome h1 {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .welcome p {
      font-size: 14px;
      color: var(--text-muted);
      max-width: 460px;
      margin: 0 auto 28px;
      line-height: 1.7;
      font-weight: 400;
    }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }

    .suggestion-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--primary);
      border-radius: var(--radius);
      padding: 11px 16px;
      font-size: 13px;
      color: var(--text);
      cursor: pointer;
      transition: all 0.15s;
      text-align: left;
      line-height: 1.5;
      max-width: 340px;
      font-family: inherit;
    }

    .suggestion-btn:hover {
      background: var(--primary-light);
      border-left-color: var(--primary-dark);
      color: var(--primary-dark);
    }

    /* ── Messages ── */
    .message {
      display: flex;
      gap: 12px;
      padding: 4px 0;
      animation: fadeIn 0.18s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      flex-direction: row-reverse;
    }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 2px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
      margin-top: 2px;
    }

    .message.user .avatar {
      background: var(--user-bg);
      color: white;
    }

    .message.bot .avatar {
      background: var(--primary-light);
      color: var(--primary);
      border: 1px solid #d9c7ec;
    }

    .bubble {
      max-width: calc(100% - 54px);
      padding: 11px 16px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.7;
    }

    .message.user .bubble {
      background: var(--user-bg);
      color: var(--user-text);
      border-bottom-right-radius: 0;
    }

    .message.bot .bubble {
      background: var(--bot-bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-bottom-left-radius: 0;
      box-shadow: var(--shadow);
    }

    /* Markdown inside bubbles */
    .bubble strong { font-weight: 700; }

    .bubble ul, .bubble ol {
      padding-left: 20px;
      margin: 6px 0;
    }

    .bubble li { margin: 3px 0; }

    .bubble p { margin: 5px 0; }
    .bubble p:first-child { margin-top: 0; }
    .bubble p:last-child  { margin-bottom: 0; }

    .bubble h1, .bubble h2, .bubble h3 {
      font-size: 13px;
      font-weight: 700;
      margin: 10px 0 4px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .bubble code {
      background: #f0eaf7;
      color: var(--primary-dark);
      padding: 1px 6px;
      border-radius: 2px;
      font-size: 12.5px;
      font-family: 'SF Mono', Consolas, monospace;
    }

    .message.user .bubble code {
      background: rgba(255,255,255,0.2);
      color: white;
    }

    .bubble blockquote {
      border-left: 3px solid var(--primary);
      padding-left: 10px;
      color: var(--text-muted);
      margin: 6px 0;
    }

    /* ── Typing indicator ── */
    .typing-indicator {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 4px 2px;
    }

    .typing-indicator span {
      width: 7px;
      height: 7px;
      background: var(--primary);
      border-radius: 50%;
      opacity: 0.6;
      animation: bounce 1.2s infinite;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.6; }
      30%            { transform: translateY(-5px); opacity: 1; }
    }

    /* ── Input area ── */
    #input-area {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 14px 24px;
      flex-shrink: 0;
    }

    .input-wrapper {
      max-width: 760px;
      margin: 0 auto;
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 8px 8px 16px;
      transition: border-color 0.15s;
    }

    .input-wrapper:focus-within {
      border-color: var(--primary);
      background: white;
    }

    #user-input {
      flex: 1;
      border: none;
      background: transparent;
      font-size: 14px;
      color: var(--text);
      outline: none;
      resize: none;
      max-height: 120px;
      min-height: 24px;
      line-height: 1.6;
      font-family: inherit;
    }

    #user-input::placeholder { color: var(--text-muted); }

    #send-btn {
      width: 36px;
      height: 36px;
      background: var(--primary);
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
    }

    #send-btn:hover { background: var(--primary-dark); }
    #send-btn:active { transform: scale(0.95); }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    #send-btn svg { fill: white; }

    .input-hint {
      font-size: 11px;
      color: var(--text-muted);
      text-align: center;
      margin-top: 6px;
      letter-spacing: 0.2px;
    }

    /* ── Footer line ── */
    .footer-brand {
      text-align: center;
      font-size: 11px;
      color: #bbb;
      margin-top: 4px;
      letter-spacing: 0.3px;
    }

    /* ── Error toast ── */
    #error-toast {
      display: none;
      position: fixed;
      bottom: 88px;
      left: 50%;
      transform: translateX(-50%);
      background: #c0392b;
      color: white;
      padding: 10px 20px;
      border-radius: var(--radius);
      font-size: 13px;
      z-index: 999;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    }
  </style>
</head>
<body>

<header>
  <span class="chubb-logo">Chubb</span>
  <div class="header-divider"></div>
  <span class="header-title">Assistente SRO SUSEP</span>
  <span class="header-badge">v3.0.0</span>
</header>

<div id="chat">
  <div class="chat-inner" id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-line"></div>
      <h1>Assistente de Registro SRO</h1>
      <p>Tire dúvidas sobre campos, blocos e laioutes do Sistema de Registro de Operações da SUSEP. Informe o laioute, bloco e campo para obter informações precisas.</p>
      <div class="suggestions">
        <button class="suggestion-btn" onclick="sendSuggestion(this)">
          Qual o formato e condição do campo "Data de Início de Vigência" no laioute 1 - Documento, bloco Dados Gerais do Documento?
        </button>
        <button class="suggestion-btn" onclick="sendSuggestion(this)">
          Quais blocos existem no laioute "3 - Sinistro evento gerador"?
        </button>
        <button class="suggestion-btn" onclick="sendSuggestion(this)">
          O campo "Código da Seguradora" no laioute 1 é obrigatório? Qual a condição?
        </button>
        <button class="suggestion-btn" onclick="sendSuggestion(this)">
          O bloco "Intermediário" do laioute 1 tem alguma condição de preenchimento?
        </button>
      </div>
    </div>
  </div>
</div>

<div id="input-area">
  <div class="input-wrapper">
    <textarea
      id="user-input"
      placeholder="Pergunte sobre um campo, bloco ou laioute do SRO..."
      rows="1"
      autocomplete="off"
      spellcheck="true"
    ></textarea>
    <button id="send-btn" onclick="sendMessage()" title="Enviar (Enter)">
      <svg width="15" height="15" viewBox="0 0 16 16">
        <path d="M1.5 1.5l13 6.5-13 6.5V9.5l9-1.5-9-1.5z"/>
      </svg>
    </button>
  </div>
  <p class="input-hint">Enter para enviar · Shift+Enter para nova linha</p>
</div>

<div id="error-toast"></div>

<script>
  const messages = [];
  let isLoading = false;

  const chatEl  = document.getElementById('chat');
  const msgsEl  = document.getElementById('messages');
  const inputEl = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');
  const welcome = document.getElementById('welcome');
  const toast   = document.getElementById('error-toast');

  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });

  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  function sendSuggestion(btn) {
    inputEl.value = btn.textContent.trim();
    sendMessage();
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isLoading) return;

    if (welcome) welcome.style.display = 'none';

    messages.push({ role: 'user', content: text });
    appendBubble('user', text);
    inputEl.value = '';
    inputEl.style.height = 'auto';

    const typingEl = appendTyping();
    setLoading(true);

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages }),
      });

      typingEl.remove();

      if (!res.ok) {
        const err = await res.json().catch(() => ({ error: 'Erro desconhecido.' }));
        showError(err.error || 'Erro ao conectar com o servidor.');
        messages.pop();
        return;
      }

      const data = await res.json();
      const reply = data.reply || '(sem resposta)';
      messages.push({ role: 'assistant', content: reply });
      appendBubble('bot', reply);

    } catch (err) {
      typingEl.remove();
      showError('Não foi possível conectar ao servidor. Tente novamente.');
      messages.pop();
    } finally {
      setLoading(false);
    }
  }

  function appendBubble(role, text) {
    const div = document.createElement('div');
    div.className = `message ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? 'EU' : 'SRO';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = role === 'bot' ? renderMarkdown(text) : escapeHtml(text);

    div.appendChild(avatar);
    div.appendChild(bubble);
    msgsEl.appendChild(div);
    scrollToBottom();
    return div;
  }

  function appendTyping() {
    const div = document.createElement('div');
    div.className = 'message bot';
    div.innerHTML = `
      <div class="avatar">SRO</div>
      <div class="bubble">
        <div class="typing-indicator">
          <span></span><span></span><span></span>
        </div>
      </div>`;
    msgsEl.appendChild(div);
    scrollToBottom();
    return div;
  }

  function setLoading(v) {
    isLoading = v;
    sendBtn.disabled = v;
  }

  function scrollToBottom() {
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function showError(msg) {
    toast.textContent = msg;
    toast.style.display = 'block';
    setTimeout(() => toast.style.display = 'none', 4000);
  }

  function renderMarkdown(text) {
    let html = escapeHtml(text);
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
    html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
    html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
    html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
    html = html.replace(/^[-•] (.+)$/gm, '<li>$1</li>');
    html = html.replace(/(<li>[\s\S]*?<\/li>)/g, '<ul>$1</ul>');
    html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
    html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
    html = html.replace(/^---+$/gm, '<hr>');
    html = html.split(/\n{2,}/).map(p => {
      p = p.trim();
      if (!p) return '';
      if (/^<(h[123]|ul|ol|li|blockquote|hr)/.test(p)) return p;
      return `<p>${p.replace(/\n/g, '<br>')}</p>`;
    }).join('\n');
    return html;
  }
</script>
</body>
</html>
